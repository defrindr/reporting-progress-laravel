name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log deployment trigger
        run: |
          echo "🚀 Deployment triggered at $(date)"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo ""
          echo "✅ Changes will be deployed to cPanel via webhook"
          echo "📝 View deploy log at: report.defrindr.space/deploy.log"

      - name: Trigger cPanel deploy webhook
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          if [ -n "$DEPLOY_URL" ] && [ -n "$DEPLOY_SECRET" ]; then
            echo "Calling deploy webhook..."
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "$DEPLOY_URL?secret=$DEPLOY_SECRET" \
              -H "Content-Type: application/json" \
              -d '{"ref":"${{ github.ref }}","after":"${{ github.sha }}","repository":{"html_url":"${{ github.repositoryUrl }}"},"pusher":{"name":"${{ github.actor }}"}}')

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            echo "HTTP Status: $HTTP_CODE"
            echo "Response: $BODY"
          else
            echo "⚠️ DEPLOY_URL or DEPLOY_SECRET not configured in GitHub secrets"
            echo "Please add them in: Repository Settings → Secrets and variables → Actions"
            echo "Required secrets:"
            echo "  - DEPLOY_URL: https://report.defrindr.space/deploy.php"
            echo "  - DEPLOY_SECRET: (your secret token)"
          fi